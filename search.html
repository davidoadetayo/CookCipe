<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="src/css/general.css" />
    <link rel="stylesheet" href="src/css/search.css" />

    <link
      rel="stylesheet"
      href="src/css/font.css"
      media="print"
      onload="this.media = 'all'"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>CookCipe | Search Ingredients. Find Recipes</title>
  </head>
  <body>
    <main>
      <div class="container">
        <nav class="nav">
          <div class="container">
            <div class="logo">
              <a href="index.html">
                <span> <strong>Cook</strong>Cipe</span>
              </a>
            </div>
          </div>
        </nav>

        <section class="container">
          <form class="search-form" autocomplete="off">
            <span class="icon">
              <i class="fa-solid fa-magnifying-glass"></i>
            </span>

            <input
              type="text"
              name="search-bar"
              class="search-bar"
              placeholder="Search for a recipe (e g Chicken)"
            />

            <button class="search-btn" type="submit">Search</button>
          </form>

          <div class="recipe-display hidden">
            <div class="container">
              <h2>Search Results</h2>
              <div class="recipe-cards"></div>
            </div>
          </div>
        </section>
      </div>
      <footer class="footer">&copy; 2026 Cookcipe</footer>
    </main>

    <div id="recipe-modal" class="modal-overlay">
      <div class="modal-content">
        <button class="close-btn">&times;</button>
        <div class="modal-body"></div>
      </div>
    </div>

    <script src="src/js/general.js"></script>
    <script src="src/js/search.js"></script>
  </body>
</html>
